server {
    listen 80;
    server_name luna.wfddeeptechlabs.com;
    return 301 https://System.Management.Automation.Internal.Host.InternalHost;
}

server {
    listen 443 ssl http2;
    server_name luna.wfddeeptechlabs.com;

    ssl_certificate     /etc/letsencrypt/live/luna.wfddeeptechlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/luna.wfddeeptechlabs.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP ;
        proxy_set_header X-Forwarded-For ;
    }

    location / {
        proxy_pass http://web:3000/;
        proxy_set_header Host System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP ;
        proxy_set_header X-Forwarded-For ;
    }
}

