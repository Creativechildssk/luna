<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUNA Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111a;
        --panel: rgba(11, 24, 36, 0.9);
        --border: rgba(148, 163, 184, 0.2);
        --accent: #7dd3fc;
        --text: #e5eef7;
        --muted: #94a3b8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(125, 211, 252, 0.16), transparent 34%),
          linear-gradient(180deg, #02070d 0%, var(--bg) 100%);
        color: var(--text);
      }
      .panel {
        width: min(560px, 100%);
        padding: 28px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: var(--panel);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 10px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 42px);
      }
      p {
        margin: 0 0 16px;
        line-height: 1.6;
        color: var(--muted);
      }
      .button {
        display: inline-block;
        margin-top: 8px;
        border-radius: 999px;
        border: 1px solid rgba(125, 211, 252, 0.35);
        background: rgba(125, 211, 252, 0.14);
        color: var(--text);
        text-decoration: none;
        padding: 12px 18px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="eyebrow">LUNA</div>
      <h1>You are offline</h1>
      <p>The app shell is installed, but live sky data needs a network connection. Reconnect and reload to fetch the latest moon, planet, satellite, and mission updates.</p>
      <a class="button" href="/">Try again</a>
    </main>
  </body>
</html>
